<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Precision Astro-Prayer | Prayer Time Tester</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&family=JetBrains+Mono:wght@400;500&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --primary: #c4b5fd;
            --secondary: #8b5cf6;
            --bg: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
            --accent: #2dd4bf;
            --text: #f8fafc;
            --gold: #f59e0b;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background: radial-gradient(circle at top right, #1e1b4b, #0f172a, #020617);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 2rem;
            overflow-x: hidden;
        }

        .container {
            max-width: 1200px;
            width: 100%;
            z-index: 1;
        }

        header {
            text-align: center;
            margin-bottom: 3rem;
            animation: fadeIn 1s ease-out;
        }

        header h1 {
            font-size: 3rem;
            font-weight: 600;
            background: linear-gradient(to right, #ffffff, var(--primary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 0.5rem;
        }

        header p {
            color: #94a3b8;
            font-size: 1.1rem;
        }

        .grid {
            display: grid;
            grid-template-columns: 1fr 1.5fr;
            gap: 2rem;
        }

        @media (max-width: 968px) {
            .grid {
                grid-template-columns: 1fr;
            }
        }

        .card {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 2rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .input-group {
            margin-bottom: 1.5rem;
        }

        label {
            display: block;
            font-size: 0.875rem;
            color: #94a3b8;
            margin-bottom: 0.5rem;
            font-weight: 500;
        }

        input,
        select {
            width: 100%;
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 0.75rem 1rem;
            color: white;
            font-family: 'JetBrains Mono', monospace;
            font-size: 1rem;
            transition: all 0.2s;
        }

        input:focus {
            outline: none;
            border-color: var(--secondary);
            box-shadow: 0 0 0 4px rgba(139, 92, 246, 0.2);
        }

        .btn {
            background: linear-gradient(135deg, var(--secondary), #7c3aed);
            color: white;
            border: none;
            border-radius: 12px;
            padding: 1rem;
            width: 100%;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            margin-top: 1rem;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 15px -3px rgba(139, 92, 246, 0.4);
        }

        .prayer-list {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .prayer-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1.5rem;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 16px;
            transition: background 0.3s;
        }

        .prayer-item:hover {
            background: rgba(255, 255, 255, 0.08);
        }

        .prayer-info {
            display: flex;
            flex-direction: column;
        }

        .prayer-name {
            font-size: 1.25rem;
            font-weight: 600;
            color: var(--primary);
        }

        .prayer-angle {
            font-size: 0.75rem;
            color: #64748b;
            font-family: 'JetBrains Mono', monospace;
        }

        .prayer-time {
            font-family: 'JetBrains Mono', monospace;
            font-size: 1.75rem;
            font-weight: 500;
            color: var(--accent);
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .badge {
            display: inline-block;
            padding: 0.25rem 0.75rem;
            background: rgba(45, 212, 191, 0.2);
            color: var(--accent);
            border-radius: 9999px;
            font-size: 0.75rem;
            font-weight: 600;
            margin-bottom: 1rem;
        }
    </style>
</head>

<body>

    <div class="container">
        <header>
            <div class="badge">Prayer Module v1.0.0</div>
            <h1>Prayer Schedule Tester</h1>
            <p>Verification for the High-Precision Prayer Times Engine</p>
        </header>

        <div class="grid">
            <!-- Settings Panel -->
            <div class="card">
                <h2 style="margin-bottom: 1.5rem">Configuration</h2>

                <div class="input-group">
                    <label>Latitude</label>
                    <input type="number" id="lat" value="31.39967" step="0.0001">
                </div>

                <div class="input-group">
                    <label>Longitude</label>
                    <input type="number" id="lng" value="73.02001" step="0.0001">
                </div>

                <div class="input-group">
                    <label>Calculation Method</label>
                    <select id="method">
                        <option value="Karachi" selected>Karachi (University of Islamic Sciences)</option>
                        <option value="MWL">Muslim World League (MWL)</option>
                        <option value="ISNA">ISNA (North America)</option>
                        <option value="Egypt">Egyptian General Authority</option>
                        <option value="Makkah">Umm al-Qura (Makkah)</option>
                        <option value="Tehran">Tehran (Institute of Geophysics)</option>
                        <option value="Jafari">Jafari / Shia</option>
                    </select>
                </div>

                <div class="input-group">
                    <label>Madhab (Asr Shadow Factor)</label>
                    <select id="madhab">
                        <option value="2" selected>Hanafi (Factor 2)</option>
                        <option value="1">Shafi / Maliki / Hanbali (Factor 1)</option>
                    </select>
                </div>

                <div class="input-group">
                    <label>Altitude / Elevation (Height)</label>
                    <div style="display: flex; gap: 0.5rem">
                        <input type="number" id="elevation" value="0" style="flex: 1; min-width: 0;">
                        <select id="elevationUnit" style="width: 80px">
                            <option value="m">Meters</option>
                            <option value="ft">Feet</option>
                        </select>
                    </div>
                </div>

                <div class="input-group">
                    <label>Current Date (Simulated Location Date)</label>
                    <input type="date" id="date">
                </div>

                <div class="input-group">
                    <label>Display Timezone Offset (GMT / UTC +/-)</label>
                    <div style="display: flex; gap: 0.5rem">
                        <input type="number" id="tzOffset" value="5" step="0.5" style="flex: 1">
                        <div style="background: rgba(0,0,0,0.2); padding: 0.75rem; border-radius: 12px; font-size: 0.75rem; color: #94a3b8">Hours</div>
                    </div>
                </div>

                <button class="btn" id="calculateBtn">Compute Daily Schedule</button>
            </div>

            <!-- Times Panel -->
            <div class="card" style="background: rgba(15, 23, 42, 0.4)">
                <h2 style="margin-bottom: 1.5rem">Daily Times</h2>
                <div class="prayer-list" id="prayerResults">
                    <!-- Dynamic Items -->
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import {
            calculate,
            PRESETS
        } from './dist/index.js';

        // Set default date to today (Local Time to avoid UTC shift)
        const now = new Date();
        const year = now.getFullYear();
        const month = String(now.getMonth() + 1).padStart(2, '0');
        const day = String(now.getDate()).padStart(2, '0');
        document.getElementById('date').value = `${year}-${month}-${day}`;

        // Set default timezone offset based on local machine
        const localOffset = -now.getTimezoneOffset() / 60;
        document.getElementById('tzOffset').value = localOffset;

        function formatTime(date) {
            if (!date || isNaN(date.getTime())) return "No Occurrence";
            
            const offsetHours = parseFloat(document.getElementById('tzOffset').value) || 0;
            // Create a date shifted by the target offset to format it simply
            const shifted = new Date(date.getTime() + offsetHours * 3600000);
            
            const h = String(shifted.getUTCHours()).padStart(2, '0');
            const m = String(shifted.getUTCMinutes()).padStart(2, '0');
            const s = String(shifted.getUTCSeconds()).padStart(2, '0');
            
            return `${h}:${m}:${s}`;
        }

        function update() {
            const lat = parseFloat(document.getElementById('lat').value);
            const lng = parseFloat(document.getElementById('lng').value);
            const method = document.getElementById('method').value;
            const asrFactor = parseInt(document.getElementById('madhab').value);
            const dateVal = new Date(document.getElementById('date').value);

            const elevation = parseFloat(document.getElementById('elevation').value);
            const elevationUnit = document.getElementById('elevationUnit').value;

            // NEW LOW-CODE API with Altitude Support
            const times = calculate({
                location: { latitude: lat, longitude: lng },
                method: method,
                madhab: asrFactor === 2 ? 'Hanafi' : 'Shafi',
                date: dateVal,
                elevation: elevation,
                elevationUnit: elevationUnit
            });
            const params = PRESETS[method];

            const resultsDiv = document.getElementById('prayerResults');
            resultsDiv.innerHTML = '';

            const prayers = [
                { name: 'Fajr', time: times.fajr, angle: params.fajrAngle + '° Below Horizon' },
                { name: 'Sunrise', time: times.sunrise, angle: '90° + 34\' + SD - HP' },
                { name: 'Dhahwa Kubra', time: times.dhahwaKubra, angle: 'Midpoint Fajr-Maghrib' },
                { name: 'Dhuhr', time: times.dhuhr, angle: 'Solar Transit' },
                { name: 'Asr', time: times.asr, angle: `Shadow: G + tan|φ-δ|` },
                { name: 'Maghrib', time: times.maghrib, angle: params.maghribAngle ? params.maghribAngle + '°' : 'Astronomical Sunset' },
                { name: 'Isha', time: times.isha, angle: params.ishaAngle ? params.ishaAngle + '°' : params.ishaInterval + 'm offset' }
            ];

            prayers.forEach(p => {
                const item = document.createElement('div');
                item.className = 'prayer-item';
                item.innerHTML = `
                    <div class="prayer-info">
                        <span class="prayer-name">${p.name}</span>
                        <span class="prayer-angle">${p.angle}</span>
                    </div>
                    <div class="prayer-time">${formatTime(p.time)}</div>
                `;
                resultsDiv.appendChild(item);
            });

            // Console output for comparison
            const offsetHours = parseFloat(document.getElementById('tzOffset').value) || 0;
            console.group("--- PRAYER MODULE DETAILED OUTPUT ---");
            console.log("Location:", lat, lng);
            console.log("Method:  ", method);
            console.log("Date:    ", dateVal.toDateString());
            console.log("Display Offset: GMT", offsetHours >= 0 ? "+" + offsetHours : offsetHours);
            console.table(prayers.map(p => ({
                Prayer: p.name,
                Display_Time: formatTime(p.time),
                UTC_ISO: (p.time && !isNaN(p.time.getTime())) ? p.time.toISOString() : 'N/A'
            })));
            console.groupEnd();
        }

        document.getElementById('calculateBtn').addEventListener('click', update);
        update(); // Initial run
    </script>
</body>

</html>
