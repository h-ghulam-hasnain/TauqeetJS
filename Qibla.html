<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Qibla Compass | Precision Astro-Prayer</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #10b981;
            --secondary: #059669;
            --bg: #064e3b;
            --card-bg: rgba(6, 78, 59, 0.7);
            --accent: #fbbf24;
            --text: #f0fdf4;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Outfit', sans-serif;
            background: radial-gradient(circle at top right, #065f46, #064e3b, #022c22);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 2rem;
        }

        .container { max-width: 600px; width: 100%; z-index: 1; }
        header { text-align: center; margin-bottom: 2rem; }
        h1 { font-size: 2.5rem; color: var(--accent); margin-bottom: 0.5rem; }

        .card {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 32px;
            padding: 2rem;
            text-align: center;
        }

        .compass-container {
            position: relative;
            width: 300px;
            height: 300px;
            margin: 2rem auto;
            border: 8px solid rgba(255, 255, 255, 0.1);
            border-radius: 50%;
            background: rgba(0, 0, 0, 0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 40px rgba(16, 185, 129, 0.2);
        }

        .compass-dial {
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            transition: transform 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* Marker for North */
        .north-mark {
            position: absolute;
            top: 10px;
            left: 50%;
            transform: translateX(-50%);
            color: #ef4444;
            font-weight: bold;
            font-family: 'JetBrains Mono', monospace;
        }

        .needle {
            position: absolute;
            width: 6px;
            height: 140px;
            background: linear-gradient(to bottom, var(--accent) 50%, rgba(255, 255, 255, 0.1) 50%);
            border-radius: 6px;
            transform-origin: bottom center;
            bottom: 50%;
            z-index: 10;
            box-shadow: 0 0 15px rgba(251, 191, 36, 0.3);
        }

        .needle-cap {
            position: absolute;
            width: 16px;
            height: 16px;
            background: var(--accent);
            border-radius: 50%;
            z-index: 11;
            box-shadow: 0 0 10px rgba(251, 191, 36, 0.5);
        }

        .qibla-mark {
            position: absolute;
            top: 10px;
            font-size: 1.5rem;
            color: var(--accent);
            font-weight: bold;
        }

        .degree-text {
            font-family: 'JetBrains Mono', monospace;
            font-size: 3rem;
            font-weight: 500;
            margin-top: 1rem;
            color: var(--accent);
        }

        .input-group {
            margin-top: 2rem;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
        }

        label { display: block; font-size: 0.75rem; color: #6eceb2; margin-bottom: 0.25rem; text-align: left; }
        input {
            width: 100%;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 0.75rem;
            color: white;
            font-family: 'JetBrains Mono', monospace;
        }

        .btn {
            background: var(--accent);
            color: #064e3b;
            border: none;
            border-radius: 12px;
            padding: 1rem;
            width: 100%;
            font-weight: 600;
            cursor: pointer;
            margin-top: 1.5rem;
            transition: all 0.2s;
        }
        .btn:hover { transform: scale(1.02); filter: brightness(1.1); }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <h1>🕋 Qibla Direction</h1>
            <p>Precise calculation using Spherical Trigonometry</p>
        </header>

        <div class="card">
            <div class="compass-container">
                <!-- Static Dial for N, E, S, W -->
                <div style="position: absolute; width: 100%; height: 100%; font-family: 'JetBrains Mono'; font-weight: bold; color: rgba(255,255,255,0.2)">
                    <span style="position: absolute; top: 15px; left: 50%; transform: translateX(-50%); color: #ef4444">N</span>
                    <span style="position: absolute; right: 15px; top: 50%; transform: translateY(-50%)">E</span>
                    <span style="position: absolute; bottom: 15px; left: 50%; transform: translateX(-50%)">S</span>
                    <span style="position: absolute; left: 15px; top: 50%; transform: translateY(-50%)">W</span>
                </div>
                
                <div class="compass-dial" id="dial">
                    <div class="needle"></div>
                    <div class="qibla-mark">🕋</div>
                </div>
                <div class="needle-cap"></div>
            </div>

            <div class="degree-text" id="angleText">---°</div>
            <p style="color: #6eceb2; font-size: 0.875rem">Bearing from North (Clockwise)</p>

            <div style="margin-top: 1.5rem; display: flex; justify-content: center; gap: 2rem;">
                <div style="text-align: left">
                    <label style="margin: 0">KM to Kaaba</label>
                    <div id="kmText" style="font-size: 1.25rem; font-weight: 600; color: white">---</div>
                </div>
                <div style="text-align: left">
                    <label style="margin: 0">Miles to Kaaba</label>
                    <div id="milesText" style="font-size: 1.25rem; font-weight: 600; color: white">---</div>
                </div>
            </div>

            <div class="input-group">
                <div>
                    <label>Latitude</label>
                    <input type="number" id="lat" value="31.3996" step="0.0001">
                </div>
                <div>
                    <label>Longitude</label>
                    <input type="number" id="lng" value="73.0200" step="0.0001">
                </div>
            </div>
            <button class="btn" id="calcBtn">Recalculate Direction</button>
            <button id="copyBtn" style="background: none; border: 1px solid rgba(255,255,255,0.1); color: #6eceb2; margin-top: 1rem; cursor: pointer; padding: 0.5rem; border-radius: 8px; font-size: 0.75rem;">Copy Bearing</button>
        </div>
    </div>

    <script type="module">
        import { calculateQibla } from './dist/index.js';

        function update() {
            const lat = parseFloat(document.getElementById('lat').value);
            const lng = parseFloat(document.getElementById('lng').value);

            const result = calculateQibla({ latitude: lat, longitude: lng });
            
            document.getElementById('angleText').innerText = result.bearing.toFixed(1) + '°';
            document.getElementById('dial').style.transform = `rotate(${result.bearing}deg)`;
            
            document.getElementById('kmText').innerText = result.distance.toLocaleString(undefined, { maximumFractionDigits: 0 }) + ' km';
            document.getElementById('milesText').innerText = (result.distance * 0.621371).toLocaleString(undefined, { maximumFractionDigits: 0 }) + ' mi';
            
            console.log("Qibla Precise Data:", result);
        }

        document.getElementById('calcBtn').addEventListener('click', update);
        document.getElementById('copyBtn').addEventListener('click', () => {
            const angle = document.getElementById('angleText').innerText;
            navigator.clipboard.writeText(angle);
            alert('Bearing copied: ' + angle);
        });
        
        update();
    </script>
</body>
</html>
